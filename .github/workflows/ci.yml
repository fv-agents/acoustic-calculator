name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  data-sync:
    name: Web-app data sync met CSV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: check_sync (app/data.js vs data/CSV)
        run: python tools/check_sync.py
      - name: calc engine unit tests
        run: python tools/test_calc.py
