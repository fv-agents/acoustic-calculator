<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumenear — Akoestische Calculator</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#fafafa;--white:#fff;--black:#0a0a0a;
  --g50:#f8f9fa;--g100:#f1f3f5;--g200:#e9ecef;--g300:#dee2e6;--g400:#ced4da;--g500:#868e96;--g600:#495057;--g700:#343a40;--g800:#212529;
  --t50:#f0fdfa;--t100:#ccfbf1;--t200:#99f6e4;--t400:#2dd4bf;--t500:#14b8a6;--t600:#0d9488;--t700:#0f766e;
  --amber:#f59e0b;--green:#16a34a;--green7:#15803d;--orange:#f97316;--red:#ef4444;--red9:#7f1d1d;
  --r:8px;--rx:6px;
  --sh:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
  --shm:0 4px 6px rgba(0,0,0,0.04),0 2px 4px rgba(0,0,0,0.03);
  --tr:all .2s cubic-bezier(.4,0,.2,1);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--g800);-webkit-font-smoothing:antialiased}

/* HEADER */
.hdr{background:var(--black);color:#fff;padding:0 28px;height:52px;display:flex;align-items:center;justify-content:space-between}
.hdr-l{display:flex;align-items:center;gap:16px}
.logo{font-size:17px;font-weight:700;letter-spacing:-.5px}
.logo-s{font-size:11px;font-weight:400;color:var(--g400);letter-spacing:.5px;text-transform:uppercase}
.pinp{background:0 0;border:none;border-bottom:1px solid var(--g600);color:#fff;font-size:13px;font-weight:500;padding:4px 0;width:180px;text-align:center;font-family:inherit}
.pinp:focus{outline:0;border-color:var(--t400)}
.pinp::placeholder{color:var(--g500)}
.hdr-r{display:flex;gap:6px}
.btn{padding:6px 14px;border-radius:var(--rx);font-size:11px;font-weight:600;cursor:pointer;border:none;transition:var(--tr);font-family:inherit}
.btn-t{background:var(--t600);color:#fff}.btn-t:hover{background:var(--t700)}
.btn-g{background:0 0;color:var(--g400);border:1px solid var(--g600)}.btn-g:hover{background:var(--g700);color:#fff}

/* TOP STATUS BAR */
.topbar{background:var(--white);border-bottom:1px solid var(--g200);padding:10px 24px;display:flex;align-items:center;gap:20px}
.room-box{width:160px;height:110px;flex-shrink:0;background:var(--g50);border:1px solid var(--g200);border-radius:var(--r);display:flex;align-items:center;justify-content:center;overflow:hidden}
.stats-row{display:flex;gap:24px;align-items:center;flex:1}
.stat{text-align:center}
.stat-v{font-size:22px;font-weight:800;line-height:1.1}
.stat-l{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--g500);margin-top:2px}
.stat-teal .stat-v{color:var(--t700)}
.stat-green .stat-v{color:var(--green7)}
.rpill{display:inline-flex;padding:6px 16px;border-radius:20px;font-size:11px;font-weight:700;color:#fff;white-space:nowrap;margin-left:auto}
.rpill-excellent{background:var(--green)}.rpill-good{background:#34d399}
.rpill-fair{background:var(--amber);color:var(--g800)}.rpill-poor{background:var(--orange)}
.rpill-bad{background:var(--red)}.rpill-terrible{background:var(--red9)}

/* 3-COL LAYOUT */
.layout{display:grid;grid-template-columns:25fr 45fr 30fr;height:calc(100vh - 52px - 54px);overflow:hidden}

/* SIDEBAR */
.side{background:var(--white);border-right:1px solid var(--g200);padding:16px;overflow-y:auto}
.stitle{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--g500);margin-bottom:8px}
.fld{margin-bottom:8px}
.fld label{display:block;font-size:10px;font-weight:600;color:var(--g600);margin-bottom:2px}
.fld select,.fld input{width:100%;padding:6px 8px;border:1px solid var(--g300);border-radius:var(--rx);font-size:12px;font-family:inherit;background:var(--white);color:var(--g800);transition:var(--tr)}
.fld select:focus,.fld input:focus{outline:0;border-color:var(--t500);box-shadow:0 0 0 2px rgba(13,148,136,.1)}
.dimgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px}
.rinfo{font-size:10px;color:var(--g500);margin-top:5px;line-height:1.5}
.dvd{height:1px;background:var(--g200);margin:12px 0}

/* CENTER PRODUCTS */
.center{padding:16px 20px;overflow-y:auto;background:var(--g50)}
.c-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.c-title{font-size:14px;font-weight:700;color:var(--g800)}
.c-count{font-size:11px;color:var(--g500)}
.ftabs{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:14px}
.ftab{padding:4px 10px;border-radius:16px;font-size:10px;font-weight:600;cursor:pointer;border:1px solid var(--g300);background:var(--white);color:var(--g600);transition:var(--tr)}
.ftab:hover{border-color:var(--t400);color:var(--t700)}
.ftab.on{background:var(--t600);color:#fff;border-color:var(--t600)}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.pc{background:var(--white);border:1px solid var(--g200);border-radius:var(--r);padding:12px;transition:var(--tr)}
.pc:hover{border-color:var(--g300);box-shadow:var(--shm)}
.pc.sel{border-color:var(--t400);background:var(--t50)}
.pc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.pc-name{font-size:12px;font-weight:600;color:var(--g800);line-height:1.3}
.pc-fam{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--g500);background:var(--g100);padding:2px 5px;border-radius:3px}
.pc-specs{display:flex;gap:10px;font-size:10px;color:var(--g500);margin-bottom:8px}
.pc-aeq{font-weight:700;color:var(--t700)}
.qc{display:flex;align-items:center}
.qb{width:30px;height:28px;border:1px solid var(--g300);background:var(--white);font-size:15px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--tr);color:var(--g600)}
.qb:first-child{border-radius:var(--rx) 0 0 var(--rx)}
.qb:last-child{border-radius:0 var(--rx) var(--rx) 0}
.qb:hover{background:var(--g100)}
.qb-p{border-color:var(--t500);color:var(--t600)}.qb-p:hover{background:var(--t50)}
.qi{width:36px;height:28px;border-top:1px solid var(--g300);border-bottom:1px solid var(--g300);border-left:0;border-right:0;text-align:center;font-size:12px;font-weight:700;font-family:inherit;color:var(--g800);background:var(--white)}
.qi:focus{outline:0}

/* RIGHT RESULTS */
.rp{background:var(--white);border-left:1px solid var(--g200);padding:16px;overflow-y:auto}
.rsec{margin-bottom:16px}
.rtitle{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--g500);margin-bottom:8px}
.rsel{background:var(--g50);border:1px solid var(--g200);border-radius:var(--r);padding:10px}
.rsel-i{display:flex;align-items:center;gap:4px;font-size:10px;padding:4px 0;border-bottom:1px solid var(--g100)}
.rsel-i:last-child{border:0}
.rsel-t{display:flex;justify-content:space-between;font-size:11px;font-weight:700;padding:6px 0 0;border-top:1px solid var(--g300);margin-top:4px;color:var(--t700)}

/* BARS */
.bars{display:flex;align-items:flex-end;gap:6px;height:100px;padding:0 2px}
.bc{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100%}
.bv{font-size:9px;font-weight:700;margin-bottom:2px}
.bf{width:100%;border-radius:3px 3px 0 0;transition:height .4s ease;min-height:2px}
.bl{font-size:8px;font-weight:600;color:var(--g500);text-align:center;margin-top:4px;text-transform:uppercase;letter-spacing:.3px}

/* PIE */
.pw{display:flex;align-items:center;gap:12px}
.pleg{display:flex;flex-direction:column;gap:2px}
.pli{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--g600)}
.pld{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.plv{font-weight:600}
.fnote{font-size:9px;color:var(--g400);line-height:1.5;padding-top:10px;border-top:1px solid var(--g200)}
input[type="number"]::-webkit-outer-spin-button,input[type="number"]::-webkit-inner-spin-button{-webkit-appearance:none}
input[type="number"]{-moz-appearance:textfield}

/* Proper isometric room - uses standard 30deg iso projection */
function IsoRoom({l,w,h,size}){
  const mx=Math.max(l,w,h,1);
  const s=Math.min(size*.35/mx, size*.08);
  const cx=size/2, cy=size*.55;
  /* iso projection: x_screen = (px - py) * cos30, y_screen = -(px + py) * sin30 - pz */
  const cos30=Math.cos(Math.PI/6), sin30=0.5;
  const proj=(px,py,pz)=>[cx+(px-py)*cos30*s, cy-(px+py)*sin30*s-pz*s];

  const pts={
    fbl:proj(0,0,0), fbr:proj(l,0,0), ftr:proj(l,w,0), ftl:proj(0,w,0),
    cbl:proj(0,0,h), cbr:proj(l,0,h), ctr:proj(l,w,h), ctl:proj(0,w,h)
  };
  const poly=arr=>arr.map(p=>p.join(',')).join(' ');

  return(
    <svg viewBox={`0 0 ${size} ${size}`} style={{width:size,height:size}}>
      {/* Floor */}
      <polygon points={poly([pts.fbl,pts.fbr,pts.ftr,pts.ftl])} fill="#e0f2fe" stroke="#0f766e" strokeWidth="1" opacity=".75"/>
      {/* Left wall */}
      <polygon points={poly([pts.ftl,pts.ftr,pts.ctr,pts.ctl])} fill="#bae6fd" stroke="#0f766e" strokeWidth="1" opacity=".5"/>
      {/* Right wall */}
      <polygon points={poly([pts.ftr,pts.fbr,pts.cbr,pts.ctr])} fill="#7dd3fc" stroke="#0f766e" strokeWidth="1" opacity=".6"/>
      {/* Ceiling edges */}
      <polyline points={poly([pts.ctl,pts.ctr,pts.cbr])} fill="none" stroke="#0f766e" strokeWidth=".7" opacity=".3" strokeDasharray="3,2"/>
      {/* Dimension labels */}
      <text x={(pts.fbl[0]+pts.fbr[0])/2} y={pts.fbl[1]+14} textAnchor="middle" fontSize="10" fontWeight="700" fill="#0f766e">{l}m</text>
      <text x={(pts.fbr[0]+pts.ftr[0])/2+10} y={(pts.fbr[1]+pts.ftr[1])/2+4} textAnchor="start" fontSize="10" fontWeight="700" fill="#0f766e">{w}m</text>
      <text x={pts.fbr[0]+8} y={(pts.fbr[1]+pts.cbr[1])/2+3} textAnchor="start" fontSize="10" fontWeight="700" fill="#0f766e">{h}m</text>
    </svg>
  );
}

function Bars({d}){
  const mx=Math.max(...d.map(x=>x.v),.1);
  return(<div className="bars">{d.map((x,i)=>(<div key={i} className="bc"><div className="bv" style={{color:x.c}}>{x.v.toFixed(2)}s</div><div className="bf" style={{height:Math.max(x.v/mx*70,2),background:x.c}}/><div className="bl">{x.l}</div></div>))}</div>);
}

function Pie({d}){
  const tot=d.reduce((s,x)=>s+x.v,0);if(!tot)return null;
  let cum=0;const cx=40,cy=40,r=36;
  return(
    <div className="pw">
      <svg viewBox="0 0 80 80" style={{width:80,height:80,flexShrink:0}}>
        {d.map((x,i)=>{
          const ang=(x.v/tot)*360,sa=cum;cum+=ang;
          const sr=(sa-90)*Math.PI/180,er=(sa+ang-90)*Math.PI/180;
          if(ang<.5)return null;
          const path=ang>=359.9?`M${cx-r},${cy}A${r},${r} 0 1 1 ${cx+r},${cy}A${r},${r} 0 1 1 ${cx-r},${cy}`
            :`M${cx},${cy}L${cx+r*Math.cos(sr)},${cy+r*Math.sin(sr)}A${r},${r} 0 ${ang>180?1:0} 1 ${cx+r*Math.cos(er)},${cy+r*Math.sin(er)}Z`;
          return<path key={i} d={path} fill={PC[i%PC.length]} stroke="#fff" strokeWidth="1"/>;
        })}
      </svg>
      <div className="pleg">{d.map((x,i)=>(<div key={i} className="pli"><div className="pld" style={{background:PC[i%PC.length]}}/><span>{x.n}</span><span className="plv">{x.v.toFixed(1)}</span></div>))}</div>
    </div>
  );
}

function App(){
  const[pn,sPn]=useState("Mijn Project");
  const[l,sL]=useState(8),[w,sW]=useState(6),[h,sH]=useState(2.8);
  const[ls,setLs]=useState("8"),[ws,setWs]=useState("6"),[hs,setHs]=useState("2.8");
  const[rt,sRt]=useState("Vergaderruimte");
  const[fm,sFm]=useState("Dun tapijt");
  const[wm,sWm]=useState("Gipsplaat + isolatie");
  const[cm,sCm]=useState("Gipsplafond (dicht)");
  const[fu,sFu]=useState("Vergaderruimte");
  const[ex,sEx]=useState("4. Losse tapijten");
  const[qty,sQty]=useState({});
  const[fam,sFam]=useState("Alle");

  const preset=k=>{sRt(k);const c=PR[k];if(c.fl)sFm(c.fl);if(c.wl)sWm(c.wl);if(c.cl)sCm(c.cl);if(c.fu)sFu(c.fu);if(c.ex)sEx(c.ex);};
  // Komma→punt normalisatie + setQ
  const parseDim=v=>parseFloat(String(v).replace(',','.'))||0;
  const setQ=(n,q)=>{if(q<=0){const{[n]:_,...r}=qty;sQty(r);}else sQty({...qty,[n]:q});};

  const c=useMemo(()=>{
    const vol=l*w*h,fA=l*w,wA=2*(l*h)+2*(w*h),cA=l*w;
    const fAb=(FLOOR[fm]||.02)*fA,wAb=(WALL[wm]||.02)*wA,cAb=(CEIL[cm]||.02)*cA,fuAb=(FURN[fu]||.005)*fA,exAb=(EX[ex]||0)*fA;
    const rAb=fAb+wAb+cAb+fuAb+exAb;
    let lAb=0;Object.entries(qty).forEach(([n,q])=>{const p=PP.find(x=>x.n===n);if(p)lAb+=q*p.eq;});
    const r0=Math.min(.161*vol/Math.max(rAb,.01),6);
    const r1=Math.min(.161*vol/Math.max(rAb+lAb,.01),6);
    const imp=r0>0?(1-r1/r0)*100:0;
    const tgt=PR[rt]?.t||.8;
    return{vol,fA,wA,cA,rAb,lAb,r0,r1,imp,tgt,
      bd:[{n:"Vloer",v:fAb},{n:"Wanden",v:wAb},{n:"Plafond",v:cAb},{n:"Meubels",v:fuAb},{n:"Extra",v:exAb},{n:"Lumenear",v:lAb}].filter(d=>d.v>0)};
  },[l,w,h,fm,wm,cm,fu,ex,qty,rt]);

  const fp=fam==="Alle"?PP:PP.filter(x=>x.f===fam);
  const sp=PP.filter(x=>qty[x.n]>0).map(x=>({...x,q:qty[x.n]}));

  const rat=(()=>{
    const r=c.r1/c.tgt;
    if(r<=1)return{t:"Uitstekend",c:"rpill-excellent"};
    if(r<=1.15)return{t:"Prima",c:"rpill-good"};
    if(r<=1.3)return{t:"Redelijk",c:"rpill-fair"};
    if(r<=1.6)return{t:"Matig",c:"rpill-poor"};
    if(r<=2)return{t:"Onvoldoende",c:"rpill-bad"};
    return{t:"Zeer slecht",c:"rpill-terrible"};
  })();
  const sti=(()=>{
    const r=c.r1;
    if(r<=0.4)return{t:"Uitstekend",v:91,c:"#16a34a",s:"STI > 0.75"};
    if(r<=0.6)return{t:"Goed",v:71,c:"#34d399",s:"STI 0.60–0.75"};
    if(r<=0.8)return{t:"Redelijk",v:50,c:"#f59e0b",s:"STI 0.45–0.60"};
    if(r<=1.2)return{t:"Matig",v:30,c:"#f97316",s:"STI 0.30–0.45"};
    return{t:"Slecht",v:12,c:"#ef4444",s:"STI < 0.30"};
  })();

  const doExport=()=>{
    const d={projectName:pn,room:{length:l,width:w,height:h,roomType:rt},materials:{fm,wm,cm,fu,ex},products:sp.map(x=>({name:x.n,qty:x.q,aeq:x.eq})),results:{rt60Without:c.r0,rt60With:c.r1,improvement:c.imp,target:c.tgt}};
    const b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});
    const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=pn.replace(/\s+/g,'_')+'_acoustic.json';a.click();
  };
  const doImport=()=>{
    const inp=document.createElement('input');inp.type='file';inp.accept='.json';
    inp.onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{
      const d=JSON.parse(ev.target.result);if(d.projectName)sPn(d.projectName);
      if(d.room){const _l=d.room.length||12,_w=d.room.width||8,_h=d.room.height||3;sL(_l);sW(_w);sH(_h);setLs(String(_l));setWs(String(_w));setHs(String(_h));if(d.room.roomType)sRt(d.room.roomType);}
      if(d.materials){sFm(d.materials.fm||"Linoleum / vinyl / PVC");sWm(d.materials.wm||"Gipsplaat + isolatie");sCm(d.materials.cm||"Systeemplafond (standaard)");sFu(d.materials.fu||"Kantoor - bureaus+stoelen");sEx(d.materials.ex||"7. Bureauschermen");}
      const q={};if(d.products)d.products.forEach(p=>{q[p.name]=p.qty;});sQty(q);
    }catch(e){alert("Import error: "+e.message);}};r.readAsText(f);};inp.click();
  };

  return(
    <div style={{height:'100vh',display:'flex',flexDirection:'column',overflow:'hidden'}}>
      {/* HEADER */}
      <div className="hdr">
        <div className="hdr-l"><span className="logo">Lumenear</span><span className="logo-s">Acoustic Calculator</span></div>
        <input className="pinp" value={pn} onChange={e=>sPn(e.target.value)} placeholder="Projectnaam"/>
        <div className="hdr-r"><button className="btn btn-t" onClick={doExport}>Export</button><button className="btn btn-g" onClick={doImport}>Import</button></div>
      </div>

      {/* TOP STATUS BAR — single source of truth for results */}
      <div className="topbar">
        <div className="room-box"><IsoRoom l={l} w={w} h={h} size={140}/></div>
        <div className="stats-row">
          <div className="stat"><div className="stat-v">{c.r0.toFixed(2)}s</div><div className="stat-l">RT60 zonder</div></div>
          <div className="stat stat-teal"><div className="stat-v">{c.r1.toFixed(2)}s</div><div className="stat-l">RT60 met Lumenear</div></div>
          <div className="stat stat-green"><div className="stat-v">{c.imp>0?c.imp.toFixed(0)+'%':'—'}</div><div className="stat-l">Verbetering</div></div>
          <div className="stat"><div className="stat-v">{c.tgt}s</div><div className="stat-l">Norm ({rt.length>20?rt.slice(0,18)+'…':rt})</div></div>
        </div>
        <div className={`rpill ${rat.c}`}>{rat.t}</div>
      </div>

      {/* 3-COLUMN LAYOUT */}
      <div className="layout">
        {/* LEFT: config */}
        <div className="side">
          <div className="stitle">Ruimte</div>
          <div className="fld"><label>Type</label><select value={rt} onChange={e=>preset(e.target.value)}>{Object.keys(PR).map(k=><option key={k}>{k}</option>)}</select></div>
          <div className="dimgrid">
            <div className="fld"><label>L (m)</label><input type="text" inputMode="decimal" value={ls} onChange={e=>{setLs(e.target.value);sL(parseDim(e.target.value));}} onBlur={e=>{const v=parseDim(e.target.value)||1;sL(v);setLs(String(v));}}/></div>
            <div className="fld"><label>B (m)</label><input type="text" inputMode="decimal" value={ws} onChange={e=>{setWs(e.target.value);sW(parseDim(e.target.value));}} onBlur={e=>{const v=parseDim(e.target.value)||1;sW(v);setWs(String(v));}}/></div>
            <div className="fld"><label>H (m)</label><input type="text" inputMode="decimal" value={hs} onChange={e=>{setHs(e.target.value);sH(parseDim(e.target.value));}} onBlur={e=>{const v=parseDim(e.target.value)||1;sH(v);setHs(String(v));}}/></div>
          </div>
          <div className="rinfo">{c.vol.toFixed(0)} m³ · vloer {c.fA.toFixed(0)} m² · wanden {c.wA.toFixed(0)} m²</div>
          <div className="dvd"/>
          <div className="stitle">Materialen</div>
          <div className="fld"><label>Vloer</label><select value={fm} onChange={e=>sFm(e.target.value)}>{Object.keys(FLOOR).map(k=><option key={k}>{k}</option>)}</select></div>
          <div className="fld"><label>Wanden</label><select value={wm} onChange={e=>sWm(e.target.value)}>{Object.keys(WALL).map(k=><option key={k}>{k}</option>)}</select></div>
          <div className="fld"><label>Plafond</label><select value={cm} onChange={e=>sCm(e.target.value)}>{Object.keys(CEIL).map(k=><option key={k}>{k}</option>)}</select></div>
          <div className="dvd"/>
          <div className="stitle">Inrichting</div>
          <div className="fld"><label>Meubilering</label><select value={fu} onChange={e=>sFu(e.target.value)}>{Object.keys(FURN).map(k=><option key={k}>{k}</option>)}</select></div>
          <div className="fld"><label>Extra akoestiek</label><select value={ex} onChange={e=>sEx(e.target.value)}>{Object.keys(EX).map(k=><option key={k}>{k}</option>)}</select></div>
        </div>

        {/* CENTER: products */}
        <div className="center">
          <div className="c-head">
            <div className="c-title">Producten selecteren</div>
            <div className="c-count">{PP.length} producten · {sp.length} geselecteerd</div>
          </div>
          <div className="ftabs">{FAMS.map(f=>(<div key={f} className={`ftab ${fam===f?'on':''}`} onClick={()=>sFam(f)}>{f}</div>))}</div>
          <div className="pgrid">
            {fp.map(p=>(<div key={p.n} className={`pc ${qty[p.n]>0?'sel':''}`}>
              <div className="pc-top"><div className="pc-name">{p.n}</div><div className="pc-fam">{p.f}</div></div>
              <div className="pc-specs"><span>αw {p.aw}</span><span>{p.a} m²</span><span className="pc-aeq">Aeq {p.eq}</span></div>
              <div className="qc">
                <button className="qb" onClick={()=>setQ(p.n,(qty[p.n]||0)-1)}>−</button>
                <input className="qi" type="number" value={qty[p.n]||0} onChange={e=>setQ(p.n,parseInt(e.target.value)||0)}/>
                <button className="qb qb-p" onClick={()=>setQ(p.n,(qty[p.n]||0)+1)}>+</button>
              </div>
            </div>))}
          </div>
        </div>

        {/* RIGHT: details */}
        <div className="rp">
          {/* Selected products — primary content here */}
          {sp.length>0&&(<div className="rsec">
            <div className="rtitle">Geselecteerde producten</div>
            <div className="rsel">
              {sp.map(p=>(<div key={p.n} className="rsel-i">
                <span style={{flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontSize:9,color:'var(--g700)'}}>{p.n}</span>
                <span style={{fontSize:9,color:'var(--t700)',fontWeight:600,flexShrink:0,marginRight:2}}>{(p.q*p.eq).toFixed(2)}m²</span>
                <div style={{display:'flex',alignItems:'center',gap:2,flexShrink:0}}>
                  <button onClick={()=>setQ(p.n,p.q-1)} style={{width:18,height:18,border:'1px solid var(--g300)',background:'var(--white)',borderRadius:3,cursor:'pointer',fontSize:13,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--g600)',padding:0,fontFamily:'inherit'}}>−</button>
                  <span style={{minWidth:18,textAlign:'center',fontWeight:700,fontSize:10,color:'var(--g800)'}}>{p.q}</span>
                  <button onClick={()=>setQ(p.n,p.q+1)} style={{width:18,height:18,border:'1px solid var(--t400)',background:'var(--t50)',borderRadius:3,cursor:'pointer',fontSize:13,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--t700)',padding:0,fontFamily:'inherit'}}>+</button>
                  <button onClick={()=>setQ(p.n,0)} title="Verwijderen" style={{width:18,height:18,border:'1px solid var(--g200)',background:'var(--g100)',borderRadius:3,cursor:'pointer',fontSize:10,display:'flex',alignItems:'center',justifyContent:'center',color:'var(--g400)',padding:0,marginLeft:1,fontFamily:'inherit'}}>×</button>
                </div>
              </div>))}
              <div className="rsel-t"><span>Totaal absorptie</span><span>{c.lAb.toFixed(2)} m² Aeq</span></div>
            </div>
          </div>)}

          {sp.length===0&&(<div className="rsec" style={{textAlign:'center',padding:'24px 16px',color:'var(--g400)'}}>
            <div style={{fontSize:28,marginBottom:6,opacity:.3}}>◇</div>
            <div style={{fontSize:12}}>Selecteer producten om het<br/>akoestisch effect te berekenen</div>
          </div>)}

          <div className="rsec">
            <div className="rtitle">RT60 vergelijking</div>
            <Bars d={[{l:"Zonder",v:c.r0,c:"#94a3b8"},{l:"Met Lumenear",v:c.r1,c:"#0d9488"},{l:"Norm",v:c.tgt,c:"#f59e0b"}]}/>
          </div>

          <div className="rsec">
            <div className="rtitle">Absorptie verdeling</div>
            <Pie d={c.bd}/>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:5,marginTop:10}}>
              {[
                {l:"Totale absorptie"  , v:(c.rAb+c.lAb).toFixed(1)+" m² Aeq"},
                {l:"Geluidsverval"     , v:(60/Math.max(c.r1,.01)).toFixed(0)+" dB/s"},
                {l:"Gem. absorptiecoëff.", v:((c.rAb+c.lAb)/Math.max(2*c.fA+c.wA,1)).toFixed(3)},
                {l:"V/A verhouding"    , v:(c.vol/Math.max(c.rAb+c.lAb,.01)).toFixed(2)+" m"},
              ].map((p,i)=>(
                <div key={i} style={{background:'var(--g50)',border:'1px solid var(--g200)',borderRadius:5,padding:'6px 8px'}}>
                  <div style={{fontSize:8,textTransform:'uppercase',letterSpacing:.5,color:'var(--g400)',fontWeight:700,marginBottom:3}}>{p.l}</div>
                  <div style={{fontSize:14,fontWeight:800,color:'var(--g800)',lineHeight:1}}>{p.v}</div>
                </div>
              ))}
            </div>
          </div>

          <div className="rsec">
            <div className="rtitle">Spraakverstaanbaarheid (STI)</div>
            <div style={{background:'var(--g100)',borderRadius:4,height:7,overflow:'hidden',marginBottom:5}}>
              <div style={{height:'100%',width:sti.v+'%',background:sti.c,borderRadius:4,transition:'width .5s ease'}}/>
            </div>
            <div style={{display:'flex',justifyContent:'space-between',fontSize:8,color:'var(--g400)',marginBottom:5}}>
              <span>Slecht</span><span>Matig</span><span>Redelijk</span><span>Goed</span><span>Uitst.</span>
            </div>
            <div style={{fontSize:11,fontWeight:700,color:sti.c}}>{sti.t} <span style={{color:'var(--g400)',fontWeight:400,fontSize:9}}>({sti.s})</span></div>
            <div style={{fontSize:9,color:'var(--g500)',marginTop:4,lineHeight:1.5}}>
              Op basis van nagalmtijd en Sabine-model (ISO 3382-3). Richtwaarde open kantoor: T₆₀ ≤ 0.4s · Vergaderruimte: ≤ 0.6s · Onderwijs: ≤ 0.5s.
            </div>
          </div>

          <div className="fnote">
            Sabine: T₆₀ = 0.161 × V / A. Octaafbanden 500–2000 Hz (spraakgemiddelde). Equivalent absorptieoppervlak Aeq per armatuur bepaald via laboratoriumtest (ISO 354). Pendant producten incl. randdiffractie-effect.
          </div>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
