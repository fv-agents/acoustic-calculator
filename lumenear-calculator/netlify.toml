# Fallback voor als de Netlify base directory op "lumenear-calculator" staat.
# Bij base = repo-root wordt de netlify.toml in de root gebruikt.
[build]
  publish = "."
  command = "echo 'static site - no build step'"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
