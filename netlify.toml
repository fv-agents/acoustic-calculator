# Netlify config — Lumenear Acoustic Calculator
# Base directory in Netlify UI: leeg laten (repo-root); dit bestand is dan leidend.

[build]
  publish = "app"
  command = "echo 'static site - no build step'"

# Security headers. Bewust GEEN X-Frame-Options: die kent geen allowlist;
# embedding wordt geregeld via CSP frame-ancestors (lumenear.com + self).
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "frame-ancestors 'self' https://lumenear.com https://*.lumenear.com"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Gevendorde libraries en fonts: lang cachen (versie wijzigt = bestandsnaam wijzigt)
[[headers]]
  for = "/vendor/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# index.html altijd vers
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
