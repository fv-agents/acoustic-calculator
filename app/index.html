/* Valideer een (geïmporteerd of opgeslagen) data-object tegen de bekende lijsten.
   Geeft {state, issues[]} terug; onbekende waarden behouden de huidige/default. */
function sanitize(d,base){
  const s={...base},issues=[];
  if(!d||typeof d!=='object')return{state:s,issues};
  if(typeof d.projectName==='string')s.pn=d.projectName.slice(0,80);
  if(typeof d.client==='string')s.client=d.client.slice(0,80);
  if(typeof d.author==='string')s.author=d.author.slice(0,80);
  if(d.room){
    for(const[k,key]of[['length','l'],['width','w'],['height','h']]){
      const v=parseFloat(d.room[k]);
      if(v>0&&v<=100)s[key]=v;else if(d.room[k]!=null)issues.push(`Afmeting ${k} ongeldig, behouden: ${base[key]} m`);
    }
    if(d.room.persons!=null)s.pe=Math.min(Math.max(Math.floor(parseInt(d.room.persons,10)||0),0),500);
    if(d.room.roomType!=null){
      if(PR[d.room.roomType])s.rt=d.room.roomType;
      else issues.push(`Ruimtetype "${d.room.roomType}" niet herkend`);
    }
  }
  if(d.materials){
    for(const[k,list,lbl]of[['fm',FLOOR,'vloer'],['wm',WALL,'wand'],['cm',CEIL,'plafond'],['fu',FURN,'meubilering']]){
      let v=d.materials[k];
      if(v==null)continue;
      if(list[v]===undefined&&LEGACY[k]&&LEGACY[k][v])v=LEGACY[k][v];
      if(list[v]!==undefined)s[k]=v;
      else issues.push(`Materiaal ${lbl} "${d.materials[k]}" niet herkend`);
    }
    const exIn=d.materials.ex;
    if(exIn!=null){
      if(Array.isArray(exIn)){
        s.ex=exIn.filter(k=>EX[k]!==undefined);
        const bad=exIn.length-s.ex.length;
        if(bad)issues.push(`${bad} extra-akoestiek optie(s) niet herkend`);
      }else if(typeof exIn==='string'){
        // legacy v5.0-formaat: één keuze uit de oude genummerde ladder
        s.ex=LEGACY_EX[exIn]||[];
        if(!LEGACY_EX[exIn]&&exIn)issues.push(`Extra akoestiek "${exIn}" niet herkend`);
      }
    }
  }
  if(Array.isArray(d.products)){
    const q={};let skipped=0;
    d.products.forEach(p=>{
      const name=p&&p.name,n=Math.max(0,Math.floor(parseInt(p&&p.qty,10)||0));
      if(name&&PP.some(x=>x.n===name)&&n>0)q[name]=n;
      else if(name)skipped++;
    });
    s.qty=q;
    if(skipped)issues.push(`${skipped} product(en) niet herkend en overgeslagen`);
  }else if(d.qty&&typeof d.qty==='object'){
    const q={};
    Object.entries(d.qty).forEach(([name,v])=>{
      const n=Math.max(0,Math.floor(parseInt(v,10)||0));
      if(PP.some(x=>x.n===name)&&n>0)q[name]=n;
    });
    s.qty=q;
  }
  return{state:s,issues};
}

function loadSaved(){
  try{
    const raw=localStorage.getItem(STORE_KEY);
    if(!raw)return DEFAULTS;
    return sanitize(JSON.parse(raw),DEFAULTS).state;
  }catch(e){return DEFAULTS;}
}

function IsoRoom({l,w,h,size}){
  const mx=Math.max(l,w,h,1);
  const s=Math.min(size*.35/mx,size*.08);
  const cx=size/2,cy=size*.55;
  const cos30=Math.cos(Math.PI/6),sin30=0.5;
  const proj=(px,py,pz)=>[cx+(px-py)*cos30*s,cy-(px+py)*sin30*s-pz*s];
  const pts={
    fbl:proj(0,0,0),fbr:proj(l,0,0),ftr:proj(l,w,0),ftl:proj(0,w,0),
    cbl:proj(0,0,h),cbr:proj(l,0,h),ctr:proj(l,w,h),ctl:proj(0,w,h)
  };
  const poly=arr=>arr.map(p=>p.join(',')).join(' ');
  return html`
    <svg viewBox=${`0 0 ${size} ${size}`} style=${{width:size,height:size}} role="img" aria-label=${`Ruimte ${l} bij ${w} bij ${h} meter`}>
      <polygon points=${poly([pts.fbl,pts.fbr,pts.ftr,pts.ftl])} fill="#e0f2fe" stroke="#0f766e" strokeWidth="1" opacity=".75"/>
      <polygon points=${poly([pts.ftl,pts.ftr,pts.ctr,pts.ctl])} fill="#bae6fd" stroke="#0f766e" strokeWidth="1" opacity=".5"/>
      <polygon points=${poly([pts.ftr,pts.fbr,pts.cbr,pts.ctr])} fill="#7dd3fc" stroke="#0f766e" strokeWidth="1" opacity=".6"/>
      <polyline points=${poly([pts.ctl,pts.ctr,pts.cbr])} fill="none" stroke="#0f766e" strokeWidth=".7" opacity=".3" strokeDasharray="3,2"/>
      <text x=${(pts.fbl[0]+pts.fbr[0])/2} y=${pts.fbl[1]+14} textAnchor="middle" fontSize="10" fontWeight="700" fill="#0f766e">${nl(l,l%1?1:0)}m</text>
      <text x=${(pts.fbr[0]+pts.ftr[0])/2+10} y=${(pts.fbr[1]+pts.ftr[1])/2+4} textAnchor="start" fontSize="10" fontWeight="700" fill="#0f766e">${nl(w,w%1?1:0)}m</text>
      <text x=${pts.fbr[0]+8} y=${(pts.fbr[1]+pts.cbr[1])/2+3} textAnchor="start" fontSize="10" fontWeight="700" fill="#0f766e">${nl(h,h%1?1:0)}m</text>
    </svg>`;
}

function Bars({d,hmax=70}){
  const mx=Math.max(...d.map(x=>x.v),.1);
  return html`<div className="bars">${d.map((x,i)=>html`
    <div key=${i} className="bc">
      <div className="bv" style=${{color:x.c}}>${x.lab!==undefined?x.lab:nl(x.v)}s</div>
      <div className="bf" style=${{height:Math.max(x.v/mx*hmax,2),background:x.c}}/>
      <div className="bl">${x.l}</div>
    </div>`)}</div>`;
}

function Pie({d}){
  const tot=d.reduce((s,x)=>s+x.v,0);if(!tot)return null;
  let cum=0;const cx=40,cy=40,r=36;
  return html`
    <div className="pw">
      <svg viewBox="0 0 80 80" style=${{width:80,height:80,flexShrink:0}} role="img" aria-label="Absorptieverdeling">
        ${d.map((x,i)=>{
          const ang=(x.v/tot)*360,sa=cum;cum+=ang;
          const sr=(sa-90)*Math.PI/180,er=(sa+ang-90)*Math.PI/180;
          if(ang<.5)return null;
          const path=ang>=359.9?`M${cx-r},${cy}A${r},${r} 0 1 1 ${cx+r},${cy}A${r},${r} 0 1 1 ${cx-r},${cy}`
            :`M${cx},${cy}L${cx+r*Math.cos(sr)},${cy+r*Math.sin(sr)}A${r},${r} 0 ${ang>180?1:0} 1 ${cx+r*Math.cos(er)},${cy+r*Math.sin(er)}Z`;
          return html`<path key=${i} d=${path} fill=${PC[i%PC.length]} stroke="#fff" strokeWidth="1"/>`;
        })}
      </svg>
      <div className="pleg">${d.map((x,i)=>html`<div key=${i} className="pli"><div className="pld" style=${{background:PC[i%PC.length]}}/><span>${x.n}</span><span className="plv">${nl(x.v,1)}</span></div>`)}</div>
    </div>`;
}

          <h2>Productadvies Lumenear</h2>
          <table>
            <thead><tr><th>Product</th><th>Familie</th><th style=${{textAlign:"right"}}>Aantal</th><th style=${{textAlign:"right"}}>Aeq per stuk</th><th style=${{textAlign:"right"}}>Totaal Aeq</th></tr></thead>

              <tr className="rep-totaal"><td>Totaal Lumenear absorptie</td><td></td><td style=${{textAlign:"right"}}>${sp.reduce((s,p)=>s+p.q,0)}</td><td></td><td style=${{textAlign:"right"}}>${nl(c.lAb)} m² Aeq</td></tr>

            <div className="rep-param"><div className="k">Geluidsverval</div><div className="v">${(60/Math.max(c.r1,.01)).toFixed(0)} dB/s</div><div className="e">Snelheid waarmee geluidsenergie uitsterft (60 dB / T₆₀).</div></div>
            <div className="rep-param"><div className="k">Gem. absorptiecoëfficiënt</div><div className="v">${nl((c.rAb+c.lAb)/Math.max(2*c.fA+c.wA,1),3)}</div><div className="e">Gemiddelde α over alle oppervlakken in de ruimte.</div></div>
            <div className="rep-param"><div className="k">V/A verhouding</div><div className="v">${nl(c.vol/Math.max(c.rAb+c.lAb,.01))} m</div><div className="e">Volume per m² absorptie; hogere waarde = galmgevoeliger.</div></div>
          </div>
        </section>

        <section>
          <h2>Spraakverstaanbaarheid (STI, indicatief)</h2>

        </section>

        <section>
          <h2>Methodiek &amp; disclaimer</h2>
          <p className="rep-method">
            Berekening volgens de Sabine-formule (T₆₀ = 0,161 × V / A), spraakgemiddelde 500–2000 Hz.
            Equivalente absorptieoppervlakken (Aeq) per armatuur zijn bepaald via onafhankelijke laboratoriummetingen conform EN-ISO 354; pendant-armaturen inclusief randdiffractie-effect.
            Bezetting gerekend met ±0,46 m² Sabine per zittende persoon${pe>0?"":" (onbezette situatie aangehouden)"}.
            De resultaten zijn een indicatieve modelberekening op basis van de opgegeven ruimtegegevens en vervangen geen akoestisch onderzoek ter plaatse.
            De gehanteerde richtwaarden zijn indicatief per ruimtetype en betreffen geen formele normtoetsing (DIN 18041). Aan deze berekening kunnen geen rechten worden ontleend.
          </p>
        </section>

        <div className="rep-foot">
          <div className="cta">Dit advies vertalen naar een offerte of een proefopstelling zien?</div>

/* ══════════ APP ══════════ */
const SAVED=loadSaved();

function App(){
  const[pn,sPn]=useState(SAVED.pn);
  const[client,sClient]=useState(SAVED.client);
  const[author,sAuthor]=useState(SAVED.author);
  const[l,sL]=useState(SAVED.l),[w,sW]=useState(SAVED.w),[h,sH]=useState(SAVED.h);
  const[pe,sPe]=useState(SAVED.pe);
  const[ls,setLs]=useState(String(SAVED.l).replace('.',',')),[ws,setWs]=useState(String(SAVED.w).replace('.',',')),[hs,setHs]=useState(String(SAVED.h).replace('.',','));
  const[rt,sRt]=useState(SAVED.rt);
  const[fm,sFm]=useState(SAVED.fm);
  const[wm,sWm]=useState(SAVED.wm);
  const[cm,sCm]=useState(SAVED.cm);
  const[fu,sFu]=useState(SAVED.fu);
  const[ex,sEx]=useState(SAVED.ex);
  const[qty,sQty]=useState(SAVED.qty);
  const[fam,sFam]=useState("Alle");
  const[search,sSearch]=useState("");
  const[note,sNote]=useState(null);

  // Autosave naar localStorage zodat F5 tijdens een demo niets wist.
  useEffect(()=>{
    try{localStorage.setItem(STORE_KEY,JSON.stringify({projectName:pn,client,author,room:{length:l,width:w,height:h,persons:pe,roomType:rt},materials:{fm,wm,cm,fu,ex},qty}));}catch(e){}
  },[pn,client,author,l,w,h,pe,rt,fm,wm,cm,fu,ex,qty]);

  useEffect(()=>{
    if(!note)return;
    const t=setTimeout(()=>sNote(null),8000);
    return()=>clearTimeout(t);
  },[note]);

  const preset=k=>{sRt(k);const c=PR[k];if(!c)return;if(c.fl)sFm(c.fl);if(c.wl)sWm(c.wl);if(c.cl)sCm(c.cl);if(c.fu)sFu(c.fu);if(c.ex)sEx([...c.ex]);};
  const exToggle=k=>sEx(prev=>prev.includes(k)?prev.filter(x=>x!==k):[...prev,k]);
  const setPe=v=>sPe(Math.min(Math.max(Math.floor(Number(v)||0),0),500));
  const setQ=(n,q)=>{
    const v=Math.max(0,Math.floor(Number(q)||0));
    sQty(prev=>{
      if(v<=0){const{[n]:_,...r}=prev;return r;}
      return{...prev,[n]:Math.min(v,999)};
    });
  };
  const dimField=(val,setStr,setNum)=>({
    value:val,
    onChange:e=>{setStr(e.target.value);const p=parseDim(e.target.value);if(p>0&&p<=100)setNum(p);},
    onBlur:e=>{const v=clampDim(e.target.value);setNum(v);setStr(String(v).replace('.',','));}
  });

  const c=useMemo(()=>{
    const vol=l*w*h,fA=l*w,wA=2*(l*h)+2*(w*h),cA=l*w;
    const fAb=(FLOOR[fm]||.02)*fA,wAb=(WALL[wm]||.02)*wA,cAb=(CEIL[cm]||.02)*cA,fuAb=(FURN[fu]||.005)*fA;
    const exAb=ex.reduce((s,k)=>s+(EX[k]||0),0)*fA;
    const pAb=pe*PERSON_AEQ;
    const rAb=fAb+wAb+cAb+fuAb+exAb+pAb;
    let lAb=0;Object.entries(qty).forEach(([n,q])=>{const p=PP.find(x=>x.n===n);if(p)lAb+=q*p.eq;});
    // RT60 ongeclampt berekenen; alleen de wéérgave wordt op 6 s afgetopt (rtDisp),
    // zodat de verbetering ook in extreme ruimtes klopt.
    const r0=.161*vol/Math.max(rAb,.01);
    const r1=.161*vol/Math.max(rAb+lAb,.01);
    const imp=r0>0?(1-r1/r0)*100:0;
    const tgt=(PR[rt]||{}).t||.8;
    return{vol,fA,wA,cA,rAb,lAb,r0,r1,imp,tgt,
      parts:{fAb,wAb,cAb,fuAb,exAb,pAb},
      bd:[{n:"Vloer",v:fAb},{n:"Wanden",v:wAb},{n:"Plafond",v:cAb},{n:"Meubels",v:fuAb},{n:"Extra",v:exAb},{n:"Personen",v:pAb},{n:"Lumenear",v:lAb}].filter(d=>d.v>0)};
  },[l,w,h,pe,fm,wm,cm,fu,ex,qty,rt]);

  const q=search.trim().toLowerCase();
  const fp=PP.filter(x=>(fam==="Alle"||x.f===fam)&&(!q||x.n.toLowerCase().includes(q)));
  const sp=PP.filter(x=>qty[x.n]>0).map(x=>({...x,q:qty[x.n]}));
  const hasP=sp.length>0;

  const rat=(()=>{
    const r=c.r1/c.tgt;
    if(r<=1)return{t:"Uitstekend",c:"rpill-excellent"};
    if(r<=1.15)return{t:"Prima",c:"rpill-good"};
    if(r<=1.3)return{t:"Redelijk",c:"rpill-fair"};
    if(r<=1.6)return{t:"Matig",c:"rpill-poor"};
    if(r<=2)return{t:"Onvoldoende",c:"rpill-bad"};
    return{t:"Zeer slecht",c:"rpill-terrible"};
  })();
  const sti=(()=>{
    const r=c.r1;
    if(r<=0.4)return{t:"Uitstekend",v:91,c:"#16a34a",s:"STI > 0.75"};
    if(r<=0.6)return{t:"Goed",v:71,c:"#34d399",s:"STI 0.60–0.75"};
    if(r<=0.8)return{t:"Redelijk",v:50,c:"#f59e0b",s:"STI 0.45–0.60"};
    if(r<=1.2)return{t:"Matig",v:30,c:"#f97316",s:"STI 0.30–0.45"};
    return{t:"Slecht",v:12,c:"#ef4444",s:"STI < 0.30"};
  })();

  const doExport=()=>{
    const d={version:3,projectName:pn,client,author,room:{length:l,width:w,height:h,persons:pe,roomType:rt},materials:{fm,wm,cm,fu,ex},products:sp.map(x=>({name:x.n,qty:x.q,aeq:x.eq})),results:{rt60Without:+c.r0.toFixed(2),rt60With:+c.r1.toFixed(2),improvement:+c.imp.toFixed(1),target:c.tgt}};
    const b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(b);
    const a=document.createElement('a');
    a.href=url;a.download=((pn||'project').trim().replace(/\s+/g,'_')||'project')+'_acoustic.json';a.click();
    setTimeout(()=>URL.revokeObjectURL(url),0);
  };
  const doImport=()=>{
    const inp=document.createElement('input');inp.type='file';inp.accept='.json';
    inp.onchange=e=>{
      const f=e.target.files[0];if(!f)return;
      const r=new FileReader();
      r.onload=ev=>{
        try{
          const d=JSON.parse(ev.target.result);
          const cur={pn,client,author,l,w,h,pe,rt,fm,wm,cm,fu,ex,qty};
          const{state:s,issues}=sanitize(d,cur);
          sPn(s.pn);sClient(s.client);sAuthor(s.author);
          sL(s.l);sW(s.w);sH(s.h);sPe(s.pe);
          setLs(String(s.l).replace('.',','));setWs(String(s.w).replace('.',','));setHs(String(s.h).replace('.',','));
          sRt(s.rt);sFm(s.fm);sWm(s.wm);sCm(s.cm);sFu(s.fu);sEx(s.ex);sQty(s.qty);
          sNote(issues.length?`Project geladen met ${issues.length} waarschuwing(en): ${issues.join(' · ')}`:`Project "${s.pn}" geladen.`);
        }catch(err){sNote("Importfout: bestand is geen geldig projectbestand ("+err.message+")");}
      };
      r.readAsText(f);
    };
    inp.click();
  };
  const doReset=()=>{
    try{localStorage.removeItem(STORE_KEY);}catch(e){}
    sPn(DEFAULTS.pn);sClient("");sAuthor(author);
    sL(DEFAULTS.l);sW(DEFAULTS.w);sH(DEFAULTS.h);sPe(0);
    setLs("8");setWs("6");setHs("2,8");
    sRt(DEFAULTS.rt);sFm(DEFAULTS.fm);sWm(DEFAULTS.wm);sCm(DEFAULTS.cm);sFu(DEFAULTS.fu);sEx([]);
    sQty({});sFam("Alle");sSearch("");
    sNote("Nieuw project gestart.");
  };
  const doReport=()=>window.print();

  return html`
    <div>
    <div className="app">
      <div className="hdr">
        <div className="hdr-l"><span className="logo">Lumenear</span><span className="logo-s">Acoustic Calculator</span></div>
        <input className="pinp" value=${pn} onChange=${e=>sPn(e.target.value)} placeholder="Projectnaam" aria-label="Projectnaam"/>
        <div className="hdr-r">
          <button className="btn btn-t" onClick=${doReport}>Rapport (PDF)</button>
          <button className="btn btn-g" onClick=${doExport}>Opslaan (.json)</button>
          <button className="btn btn-g" onClick=${doImport}>Openen</button>
          <button className="btn btn-g" onClick=${doReset} title="Alles terug naar standaardwaarden">Nieuw</button>
        </div>
      </div>

      <div className="topbar">
        <div className="room-box"><${IsoRoom} l=${l} w=${w} h=${h} size=${140}/></div>
        <div className="stats-row">
          <div className="stat"><div className="stat-v">${rtDisp(c.r0)}s</div><div className="stat-l">RT60 zonder</div></div>
          <div className="stat stat-teal"><div className="stat-v">${rtDisp(c.r1)}s</div><div className="stat-l">RT60 met Lumenear</div></div>
          <div className="stat stat-green"><div className="stat-v">${hasP&&c.imp>0.5?Math.round(c.imp)+'%':'—'}</div><div className="stat-l">Verbetering</div></div>
          <div className="stat" title=${TIP.norm}><div className="stat-v">${nl(c.tgt,1)}s</div><div className="stat-l">Richtwaarde (${rt.length>20?rt.slice(0,18)+'…':rt})</div><div className="stat-sub">indicatief, geen DIN 18041-toetsing</div></div>
        </div>
        <div className=${`rpill ${rat.c}`}>${hasP?"Met Lumenear":"Huidige situatie"}: ${rat.t}</div>
      </div>

      <div className="layout">
        <div className="side">
          <div className="stitle">Project</div>
          <div className="fld"><label htmlFor="f-client">Klant / organisatie</label><input id="f-client" value=${client} onChange=${e=>sClient(e.target.value)} placeholder="Optioneel, komt in rapport"/></div>
          <div className="fld"><label htmlFor="f-author">Opgesteld door</label><input id="f-author" value=${author} onChange=${e=>sAuthor(e.target.value)} placeholder="Naam adviseur"/></div>
          <div className="dvd"/>
          <div className="stitle">Ruimte</div>
          <div className="fld"><label htmlFor="f-type">Type</label><select id="f-type" value=${rt} onChange=${e=>preset(e.target.value)}>${Object.keys(PR).map(k=>html`<option key=${k}>${k}</option>`)}</select></div>
          <div className="dimgrid">
            <div className="fld"><label htmlFor="f-l">L (m)</label><input id="f-l" type="text" inputMode="decimal" ...${dimField(ls,setLs,sL)}/></div>
            <div className="fld"><label htmlFor="f-w">B (m)</label><input id="f-w" type="text" inputMode="decimal" ...${dimField(ws,setWs,sW)}/></div>
            <div className="fld"><label htmlFor="f-h">H (m)</label><input id="f-h" type="text" inputMode="decimal" ...${dimField(hs,setHs,sH)}/></div>
          </div>
          <div className="fld" style=${{marginTop:8}}><label htmlFor="f-pe" title=${TIP.person}>Personen (gem. bezetting) ⓘ</label><input id="f-pe" type="number" min="0" max="500" value=${pe} title=${TIP.person} onFocus=${e=>e.target.select()} onChange=${e=>setPe(e.target.value)}/></div>
          <div className="rinfo">${nl(c.vol,0)} m³ · vloer ${nl(c.fA,0)} m² · wanden ${nl(c.wA,0)} m²${pe>0?` · ${pe} pers. = ${nl(pe*PERSON_AEQ,1)} m² abs.`:""}</div>
          <div className="dvd"/>
          <div className="stitle">Materialen</div>
          <div className="fld"><label htmlFor="f-fm">Vloer</label><select id="f-fm" value=${fm} onChange=${e=>sFm(e.target.value)}>${Object.keys(FLOOR).map(k=>html`<option key=${k}>${k}</option>`)}</select></div>
          <div className="fld"><label htmlFor="f-wm">Wanden</label><select id="f-wm" value=${wm} onChange=${e=>sWm(e.target.value)}>${Object.keys(WALL).map(k=>html`<option key=${k}>${k}</option>`)}</select></div>
          <div className="fld"><label htmlFor="f-cm">Plafond</label><select id="f-cm" value=${cm} onChange=${e=>sCm(e.target.value)}>${Object.keys(CEIL).map(k=>html`<option key=${k}>${k}</option>`)}</select></div>
          <div className="dvd"/>
          <div className="stitle">Inrichting</div>
          <div className="fld"><label htmlFor="f-fu">Meubilering</label><select id="f-fu" value=${fu} onChange=${e=>sFu(e.target.value)}>${Object.keys(FURN).map(k=>html`<option key=${k}>${k}</option>`)}</select></div>
          <div className="fld"><label>Extra akoestiek (aanwezig)</label>
            ${Object.keys(EX).map(k=>html`<label key=${k} className="chk"><input type="checkbox" checked=${ex.includes(k)} onChange=${()=>exToggle(k)}/><span>${k}</span></label>`)}
          </div>
        </div>

        <div className="center">
          <div className="c-head">
            <div className="c-title">Producten selecteren</div>
            <input className="psearch" type="search" placeholder="Zoek product…" value=${search} onChange=${e=>sSearch(e.target.value)} aria-label="Zoek product"/>
            <div className="c-count">${fp.length}/${PP.length} · ${sp.length} geselecteerd</div>
          </div>
          <div className="ftabs" role="tablist">${FAMS.map(f=>html`<button key=${f} role="tab" aria-selected=${fam===f} className=${`ftab ${fam===f?'on':''}`} onClick=${()=>sFam(f)}>${f}</button>`)}</div>
          <div className="pgrid">
            ${fp.map(p=>html`<div key=${p.n} className=${`pc ${qty[p.n]>0?'sel':''}`}>
              <div className="pc-top"><div className="pc-name">${p.n}</div><div className="pc-fam">${p.f}</div></div>
              <div className="pc-specs"><span title=${TIP.aw}>αw ${p.aw}</span><span title="Akoestisch oppervlak">${p.a} m²</span><span className="pc-aeq" title=${TIP.aeq}>Aeq ${p.eq}</span></div>
              <div className="qc">
                <button className="qb" aria-label=${"Minder "+p.n} onClick=${()=>setQ(p.n,(qty[p.n]||0)-1)}>−</button>
                <input className="qi" type="number" min="0" value=${qty[p.n]||0} aria-label=${"Aantal "+p.n} onFocus=${e=>e.target.select()} onChange=${e=>setQ(p.n,e.target.value)}/>
                <button className="qb qb-p" aria-label=${"Meer "+p.n} onClick=${()=>setQ(p.n,(qty[p.n]||0)+1)}>+</button>
              </div>
            </div>`)}
          </div>
          ${fp.length===0?html`<div style=${{textAlign:'center',padding:'24px',color:'var(--g500)',fontSize:12}}>Geen producten gevonden voor "${search}"${fam!=="Alle"?` in familie ${fam}`:""}.</div>`:null}
        </div>

        <div className="rp">
          ${hasP?html`<div className="rsec">
            <div className="rtitle">Geselecteerde producten</div>
            <div className="rsel">
              ${sp.map(p=>html`<div key=${p.n} className="rsel-i">
                <span style=${{flex:1,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',fontSize:9,color:'var(--g700)'}}>${p.n}</span>
                <span style=${{fontSize:9,color:'var(--t700)',fontWeight:600,flexShrink:0,marginRight:2}}>${nl(p.q*p.eq)}m²</span>
                <div style=${{display:'flex',alignItems:'center',gap:2,flexShrink:0}}>
                  <button className="mini-b" aria-label=${"Minder "+p.n} onClick=${()=>setQ(p.n,p.q-1)}>−</button>
                  <span style=${{minWidth:18,textAlign:'center',fontWeight:700,fontSize:10,color:'var(--g800)'}}>${p.q}</span>
                  <button className="mini-b plus" aria-label=${"Meer "+p.n} onClick=${()=>setQ(p.n,p.q+1)}>+</button>
                  <button className="mini-b del" aria-label=${"Verwijder "+p.n} title="Verwijderen" onClick=${()=>setQ(p.n,0)}>×</button>
                </div>
              </div>`)}
              <div className="rsel-t"><span>Totaal absorptie</span><span>${nl(c.lAb)} m² Aeq</span></div>
            </div>
          </div>`:html`<div className="rsec" style=${{textAlign:'center',padding:'24px 16px',color:'var(--g500)'}}>
            <div style=${{fontSize:28,marginBottom:6,opacity:.35}}>◇</div>
            <div style=${{fontSize:12,lineHeight:1.6}}>Kies links de ruimte en materialen, selecteer in het midden armaturen met <b>+</b>.<br/>Het effect verschijnt direct bovenin en hier.</div>
          </div>`}

          <div className="rsec">
            <div className="rtitle">RT60 vergelijking</div>
            <${Bars} d=${[{l:"Zonder",v:Math.min(c.r0,6),lab:rtDisp(c.r0),c:"#94a3b8"},{l:"Met Lumenear",v:Math.min(c.r1,6),lab:rtDisp(c.r1),c:"#0d9488"},{l:"Richtwaarde",v:c.tgt,lab:nl(c.tgt,1),c:"#f59e0b"}]}/>
          </div>

          <div className="rsec">
            <div className="rtitle">Absorptie verdeling</div>
            <${Pie} d=${c.bd}/>
            <div style=${{display:'grid',gridTemplateColumns:'1fr 1fr',gap:5,marginTop:10}}>
              ${[
                {l:"Totale absorptie",v:nl(c.rAb+c.lAb,1)+" m² Aeq",t:"Som van ruimte- en Lumenear-absorptie"},
                {l:"Geluidsverval",v:(60/Math.max(c.r1,.01)).toFixed(0)+" dB/s",t:TIP.decay},
                {l:"Gem. absorptiecoëff.",v:nl((c.rAb+c.lAb)/Math.max(2*c.fA+c.wA,1),3),t:TIP.alpha},

              ].map((p,i)=>html`
                <div key=${i} title=${p.t} style=${{background:'var(--g50)',border:'1px solid var(--g200)',borderRadius:5,padding:'6px 8px',cursor:'help'}}>
                  <div style=${{fontSize:8,textTransform:'uppercase',letterSpacing:.5,color:'var(--g500)',fontWeight:700,marginBottom:3}}>${p.l}</div>
                  <div style=${{fontSize:14,fontWeight:800,color:'var(--g800)',lineHeight:1}}>${p.v}</div>
                </div>`)}
            </div>
          </div>

          <div className="rsec">
            <div className="rtitle" title=${TIP.sti}>Spraakverstaanbaarheid (STI)</div>
            <div style=${{background:'var(--g100)',borderRadius:4,height:7,overflow:'hidden',marginBottom:5}}>
              <div style=${{height:'100%',width:sti.v+'%',background:sti.c,borderRadius:4,transition:'width .5s ease'}}/>
            </div>
            <div style=${{display:'flex',justifyContent:'space-between',fontSize:8,color:'var(--g500)',marginBottom:5}}>
              <span>Slecht</span><span>Matig</span><span>Redelijk</span><span>Goed</span><span>Uitst.</span>
            </div>
            <div style=${{fontSize:11,fontWeight:700,color:sti.c}}>${sti.t} <span style=${{color:'var(--g500)',fontWeight:400,fontSize:9}}>(${sti.s})</span></div>
            <div style=${{fontSize:9,color:'var(--g500)',marginTop:4,lineHeight:1.5}}>
              Op basis van nagalmtijd en Sabine-model (ISO 3382-3). Richtwaarde open kantoor: T₆₀ ≤ 0,4s · Vergaderruimte: ≤ 0,6s · Onderwijs: ≤ 0,5s.
            </div>
          </div>

          <div className="fnote">
            Sabine: T₆₀ = 0,161 × V / A. Octaafbanden 500–2000 Hz (spraakgemiddelde). Aeq per armatuur bepaald via laboratoriumtest (EN-ISO 354). Pendant producten incl. randdiffractie-effect. Indicatieve berekening — geen vervanging van akoestisch advies ter plaatse.
          </div>
        </div>
      </div>

      ${note?html`<div className="toast" role="status">${note}<button aria-label="Sluiten" onClick=${()=>sNote(null)}>×</button></div>`:null}
    </div>

    <${Report} pn=${pn} client=${client} author=${author} l=${l} w=${w} h=${h} pe=${pe} rt=${rt} fm=${fm} wm=${wm} cm=${cm} fu=${fu} ex=${ex} c=${c} sp=${sp} rat=${rat} sti=${sti} parts=${c.parts}/>
    </div>`;
}

ReactDOM.createRoot(document.getElementById('root')).render(html`<${App}/>`);
})();
</script>
